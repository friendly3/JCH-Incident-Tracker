name: Apply native time picker fix
on:
  workflow_dispatch:
  push:
    paths:
      - 'patches/_v3_b64_*.txt'
      - 'patches/timepicker-icon-button-v3.patch'
      - '.github/workflows/apply-time-picker-v2.yml'
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Rebuild patch and apply
        run: |
          set -euo pipefail
          if ls patches/_v3_b64_*.txt >/dev/null 2>&1; then
            cat patches/_v3_b64_*.txt | tr -d '\n' | base64 -d > patches/timepicker-icon-button-v3.patch
          fi
          test -f patches/timepicker-icon-button-v3.patch
          if grep -q openPickerFromButton src/lib/components/IncidentForm.svelte; then
            echo "Already applied"
          else
            git apply --verbose patches/timepicker-icon-button-v3.patch
          fi
          grep -q openPickerFromButton src/lib/components/IncidentForm.svelte
          grep -q data-datetime-wrap src/lib/components/IncidentForm.svelte
          grep -q '0.001' src/app.css
      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/components/IncidentForm.svelte src/app.css patches/timepicker-icon-button-v3.patch
          if git diff --cached --quiet; then echo "No changes"; exit 0; fi
          git commit -m "fix: clock icon button opens native time picker via showPicker"
          git push
