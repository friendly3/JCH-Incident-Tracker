name: Apply native time picker fix
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/apply-time-picker-v2.yml'
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore form if placeholder, apply native picker patches
        run: |
          set -euo pipefail
          mkdir -p patches
          echo '' | base64 -d > patches/timepicker-native-controls-form.patch
          echo 'PLACEHOLDER_CSS_B64' | base64 -d > patches/timepicker-native-controls-css.patch
