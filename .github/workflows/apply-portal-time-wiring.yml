name: Apply portal time form wiring
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/apply-portal-time-wiring.yml'
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply wiring patch
        run: |
          set -euo pipefail
          echo '' | base64 -d > /tmp/p.patch
          git apply --verbose /tmp/p.patch
