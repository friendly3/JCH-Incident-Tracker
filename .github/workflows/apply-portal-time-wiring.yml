name: Apply portal time form wiring
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/apply-portal-time-wiring.yml'
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply wiring patch
        run: |
          set -euo pipefail
          rm -f /tmp/p.b64
          echo '' >> /tmp/p.b64
          echo '' >> /tmp/p.b64
          echo '' >> /tmp/p.b64
          echo '' >> /tmp/p.b64
          echo 'LnRpbWUtcGlja2VyLXBvcG92ZXInKSB8fCB0YXJnZXQuY2xvc2VzdCgnW2RhdGEtdGltZS1waWNrZXItcG9ydGFsXScpKQorCQkpIHsKIAkJCXJldHVybjsKIAkJfQogCQlpZiAoCg==' >> /tmp/p.b64
          base64 -d /tmp/p.b64 > /tmp/p.patch
          git apply --verbose /tmp/p.patch
          grep -q 'function openTimePicker' src/lib/components/IncidentForm.svelte
          grep -q 'data-time-field' src/lib/components/IncidentForm.svelte
          ! grep -q 'anchorEl' src/lib/components/IncidentForm.svelte
          grep -q 'use:portal' src/lib/components/TimePickerPopover.svelte
      - name: Commit
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/components/IncidentForm.svelte src/routes/+page.svelte
          git diff --cached --quiet && exit 0
          git commit -m "fix: open portaled time picker from clock icon and time field"
          git push
